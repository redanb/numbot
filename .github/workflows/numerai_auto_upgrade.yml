name: Numerai Constant Upgrade 24/7

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: "node20"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pre-Flight Secret Check
        run: |
          if [ -z "${{ secrets.NUMERAI_PUBLIC_ID }}" ]; then
            echo "::error::NUMERAI_PUBLIC_ID is missing from GitHub Secrets!"
            exit 1
          fi
          if [ -z "${{ secrets.NUMERAI_SECRET_KEY }}" ]; then
            echo "::error::NUMERAI_SECRET_KEY is missing from GitHub Secrets!"
            exit 1
          fi
          echo "All secrets present."

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Get current week
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Numerai datasets
        uses: actions/cache@v4
        with:
          path: |
            train.parquet
            validation.parquet
          key: numerai-data-v5.0-week-${{ steps.date.outputs.week }}
          restore-keys: |
            numerai-data-v5.0-

      - name: Run Auto-Upgrade
        env:
          NUMERAI_PUBLIC_ID: ${{ secrets.NUMERAI_PUBLIC_ID }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python numerai_auto_upgrade.py

      - name: Run Brainbot Self-Correction
        env:
          NUMERAI_PUBLIC_ID: ${{ secrets.NUMERAI_PUBLIC_ID }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python numerai_brainbot.py

      - name: Commit Updated Metrics
        run: |
          git config --global user.name 'Numerai Bot'
          git config --global user.email 'bot@numerai.ai'
          git add champion_metrics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Champion Metrics [skip ci]" && git push)
