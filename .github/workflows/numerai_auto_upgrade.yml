name: Numerai Constant Upgrade 24/7

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  upgrade:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas xgboost optuna numerapi cloudpickle scipy scikit-learn

      - name: Run Auto-Upgrade
        env:
          NUMERAI_PUBLIC_ID: ${{ secrets.NUMERAI_PUBLIC_ID }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python numerai_auto_upgrade.py

      - name: Run Sentinel Self-Correction
        env:
          NUMERAI_PUBLIC_ID: ${{ secrets.NUMERAI_PUBLIC_ID }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python numerai_sentinel.py

      - name: Commit Updated Metrics
        run: |
          git config --global user.name 'Numerai Bot'
          git config --global user.email 'bot@numerai.ai'
          git add champion_metrics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Champion Metrics [skip ci]" && git push)
